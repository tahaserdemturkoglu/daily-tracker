<script>(()=>{const q=id=>document.getElementById(id),old=window.loadReport;function clean(s){return String(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}function titleIcon(t){if(t.includes("UYKU"))return "😴";if(t.includes("EGZERS"))return "💪";if(t.includes("BESLEN"))return "🥩";if(t.includes("IS"))return "💼";if(t.includes("ANTRENOR"))return "🏋️";if(t.includes("RUH"))return "⚡";if(t.includes("VITAMIN"))return "💊";if(t.includes("ANALIZ"))return "📌";return "📄"}

window.saveTrainingExercise=async()=>{if(!q("trex").value.trim())return toast("Hareket gerekli");await fetch("/api/training/exercises",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({training_day:q("trday").value,exercise:q("trex").value,sets:q("trsets").value,reps:q("trreps").value,weight:q("trw").value})});["trex","trsets","trreps","trw"].forEach(id=>q(id).value="");toast("Hareket eklendi");loadTrainingExercises()};
window.loadTrainingExercises=async()=>{let list=q("training-list");if(!list)return;let rows=await fetch("/api/training/exercises").then(r=>r.json());let days=["Push","Pull","Leg","Upper","Lower"];list.innerHTML=days.map(day=>"<div class=template-item style=display:block><div class=template-title>"+day+"</div>"+rows.filter(x=>x.training_day===day).map(x=>"<div class=template-meta>"+x.exercise+" · "+(x.sets||"-")+" set · "+(x.reps||"-")+" tekrar · "+(x.weight||"")+" <button class=icon-btn onclick=deleteTrainingExercise("+x.id+")>✕</button></div>").join("")+"</div>").join("")};window.deleteTrainingExercise=async id=>{await fetch("/api/training/exercises/"+id,{method:"DELETE"});loadTrainingExercises()};setInterval(addTrainingPanel,1000)})();</script>
<script>(()=>{function q(id){return document.getElementById(id)}function sleepHours(){let b=q("sl-bed")?.value,w=q("sl-wake")?.value;if(!b||!w||!q("sl-h"))return;let [bh,bm]=b.split(":").map(Number),[wh,wm]=w.split(":").map(Number);let start=bh*60+bm,end=wh*60+wm;if(end<=start)end+=24*60;let h=Math.round(((end-start)/60)*10)/10;q("sl-h").value=h}setInterval(()=>{let b=q("sl-bed"),w=q("sl-wake");if(b&&!b.dataset.autoSleep){b.dataset.autoSleep=1;w.dataset.autoSleep=1;b.addEventListener("change",sleepHours);w.addEventListener("change",sleepHours);b.addEventListener("input",sleepHours);w.addEventListener("input",sleepHours)}},700)})();</script>

<script>(()=>{const q=id=>document.getElementById(id),api=u=>fetch(u).then(r=>r.json());async function del2(url,name){if(!confirm(name+" silinsin mi?"))return;let r=await fetch(url,{method:"DELETE"});if(!r.ok)return toast("Silinemedi");toast(name+" silindi");await refreshDeleteManager();if(window.loadToday)loadToday();if(window.mealLoad)mealLoad();if(window.loadReport)loadReport()}function addDeleteManager(){if(q("delete-manager"))return;let host=q("tab-log")?.querySelector(".cards-grid");if(!host)return;let d=document.createElement("div");d.id="delete-manager";d.className="card delete-manager";d.innerHTML="<div class=card-head><span class=card-icon>🗂️</span><div><div class=card-name>Bugünkü Kayıtları Yönet</div><div class=card-sub>Ne dolu, ne boş gör; tek tek veya kategori olarak sil</div></div></div><div id=dm-grid class=dm-grid></div>";host.before(d);refreshDeleteManager()}
function card(title,meta,url,filled){let btn=filled?"<button class=\"icon-btn dm-danger\" onclick=\"deleteManaged(\x27"+url+"\x27,\x27"+title+"\x27)\">✕</button>":"";return "<div class=\"dm-item "+(filled?"":"dm-empty")+"\"><div><div class=dm-title>"+title+"</div><div class=dm-meta>"+meta+"</div><span class=dm-pill>"+(filled?"Kayıt var":"Boş")+"</span></div><div class=dm-actions>"+btn+"</div></div>"}
window.deleteManaged=del2;window.refreshDeleteManager=async function(){let g=q("dm-grid");if(!g)return;let t=await api("/api/today"),meals=await api("/api/meals/today");let html="";
html+=card("Uyku",t.sleep&&t.sleep.id?(t.sleep.hours+" saat · kalite "+(t.sleep.quality||"-")):"Kayıt yok","/api/log/sleep",!!(t.sleep&&t.sleep.id));
html+=card("Egzersiz",t.exercise&&t.exercise.id?((t.exercise.type||"-")+" · "+(t.exercise.duration||"-")+" dk"):"Kayıt yok","/api/log/exercise",!!(t.exercise&&t.exercise.id));html+=card("Beslenme/Su",t.nutrition&&t.nutrition.id?((t.nutrition.calories||0)+" kcal · "+((t.nutrition.water_ml||0)/1000).toFixed(1)+"L su"):"Kayıt yok","/api/log/nutrition",!!(t.nutrition&&t.nutrition.id));
html+=card("İş",t.work&&t.work.id?((t.work.hours||0)+" saat"):"Kayıt yok","/api/log/work",!!(t.work&&t.work.id));html+=card("Antrenörlük",t.coaching&&t.coaching.id?((t.coaching.sessions||0)+" seans"):"Kayıt yok","/api/log/coaching",!!(t.coaching&&t.coaching.id));html+=card("Ruh Hali",t.mood&&t.mood.id?("Enerji "+(t.mood.energy||"-")+" · Stres "+(t.mood.stress||"-")):"Kayıt yok","/api/log/mood",!!(t.mood&&t.mood.id));html+=card("Günlük Not",t.note?"Not var":"Kayıt yok","/api/note",!!t.note);
html+="<div class=dm-item style=display:block><div class=dm-title>Öğünler</div><div class=dm-meta>"+(meals.length?"Tek tek silebilirsin":"Bugün öğün kaydı yok")+"</div>";for(let m of meals){html+="<div class=dm-meta>"+(m.slot||"-")+": "+(m.description||m.title||"-")+" <button class=\"icon-btn dm-danger\" onclick=\"deleteManaged(\x27/api/meals/"+m.id+"\x27,\x27Öğün\x27)\">✕</button></div>"}html+="</div>";
html+="<div class=dm-item style=display:block><div class=dm-title>Vitaminler</div><div class=dm-meta>"+(t.vitamins&&t.vitamins.length?"Tek tek silebilirsin":"Bugün vitamin yok")+"</div>";for(let v of (t.vitamins||[])){html+="<div class=dm-meta>"+(v.name||"-")+" "+(v.amount||"")+" "+(v.unit||"")+" <button class=\"icon-btn dm-danger\" onclick=\"deleteManaged(\x27/api/vitamin/"+v.id+"\x27,\x27Vitamin\x27)\">✕</button></div>"}html+="</div>";g.innerHTML=html};setInterval(addDeleteManager,800)})();</script>


<style id="meal-board-clean-v4">
#meal-board{display:none!important}
.meal-clean-board{margin-bottom:16px}
.meal-clean-list{display:grid;gap:10px}
.meal-clean-row{display:grid;grid-template-columns:180px minmax(180px,1fr) 90px 90px 90px 90px 86px;gap:8px;align-items:end;border-top:1px solid #e5edf5;padding-top:10px}
.meal-clean-row:first-child{border-top:0;padding-top:0}
.meal-clean-row label{display:block}
.meal-clean-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:12px 0}
.meal-chip{border:1px solid #d8e1ec;border-radius:9px;background:#f8fbff;padding:9px 10px}
.meal-chip b{display:block;color:#172033;font-size:1rem}.meal-chip span{font-size:.72rem;color:#64748b;text-transform:uppercase}
.meal-clean-items{display:grid;gap:8px;margin-top:12px}
.meal-clean-item{border:1px solid #d8e1ec;background:#fff;border-radius:9px;padding:10px;display:flex;justify-content:space-between;gap:8px}
.meal-clean-actions{display:flex;gap:6px;align-items:flex-start}
.meal-clean-actions .icon-btn{width:auto;min-width:34px;padding:0 8px}
@media(max-width:1100px){.meal-clean-row{grid-template-columns:1fr 1fr}.meal-clean-row button{grid-column:1/-1}}
</style>
<script id="meal-board-clean-v4">
(() => {
  const q = id => document.getElementById(id);
  const slots = ["kahvaltı","öğle","ara atıştırma","pre-workout","post-workout","akşam","extra"];
  const esc = v => String(v ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
  let templates = [], meals = [];

  function stopOldMacroLoop(){
    ["pro-ara atıştırma","carb-ara atıştırma","fat-ara atıştırma"].forEach(id => {
      if (!q(id)) { const s = document.createElement("span"); s.id = id; s.hidden = true; document.body.appendChild(s); }
    });
  }

  function mount(){
    stopOldMacroLoop();
    if (q("meal-board-clean-v4")) return;
    const host = q("tab-log")?.querySelector(".cards-grid");
    if (!host) return;
    const panel = document.createElement("div");
    panel.id = "meal-board-clean-v4";
    panel.className = "card meal-clean-board";
    panel.innerHTML = `<div class=card-head><span class=card-icon>🍽️</span><div><div class=card-name>Öğün Düzeni</div><div class=card-sub>Tek panel, tek kayıt, anlık makro senkronizasyon</div></div></div><div id=meal-clean-summary class=meal-clean-summary></div><div id=meal-clean-list class=meal-clean-list></div><div class=section-title style="margin-top:14px">Bugün Eklenen Öğünler</div><div id=meal-clean-items class=meal-clean-items></div>`;
    host.before(panel);
    loadMealClean();
  }

  async function loadMealClean(){
    templates = await fetch("/api/templates").then(r => r.json()).catch(() => []);
    templates = templates.filter(x => x.kind === "meal");
    meals = await fetch("/api/meals/today").then(r => r.json()).catch(() => []);
    renderMealClean();
    if (window.loadMacroBoard) loadMacroBoard();
  }
  window.mealLoad = loadMealClean;

  function totals(){
    return meals.reduce((a,m) => {
      ["calories","protein_g","carbs_g","fat_g","fiber_g"].forEach(k => a[k] += parseFloat(m[k] || 0));
      return a;
    }, {calories:0,protein_g:0,carbs_g:0,fat_g:0,fiber_g:0});
  }

  function renderMealClean(){
    const sum = totals();
    q("meal-clean-summary").innerHTML = [
      ["Kalori",sum.calories,"kcal"],["Protein",sum.protein_g,"g"],["Karbonhidrat",sum.carbs_g,"g"],["Yağ",sum.fat_g,"g"],["Lif",sum.fiber_g,"g"]
    ].map(x => `<div class=meal-chip><b>${Math.round(x[1]*10)/10}</b><span>${x[0]} ${x[2]}</span></div>`).join("");
    q("meal-clean-list").innerHTML = slots.map(rowHtml).join("");
    q("meal-clean-items").innerHTML = meals.length ? meals.map(itemHtml).join("") : `<div class=meal-clean-item><div><b>Henüz öğün yok</b><div class=card-sub>Kaydedince burada listelenecek.</div></div></div>`;
    q("meal-clean-list").querySelectorAll("[data-template]").forEach(sel => sel.onchange = () => fillFromTemplate(sel.dataset.slot, sel.value));
    q("meal-clean-list").querySelectorAll("[data-save-slot]").forEach(btn => btn.onclick = () => saveSlot(btn.dataset.saveSlot));
    q("meal-clean-items").querySelectorAll("[data-delete-meal]").forEach(btn => btn.onclick = () => deleteMeal(btn.dataset.deleteMeal));
  }

  function rowHtml(slot){
    const options = `<option value="">Şablon seç</option>` + templates.map(t => `<option value="${t.id}">${esc(t.category)} · ${esc(t.title)}</option>`).join("");
    const key = slot.replace(/\s+/g,"-");
    return `<div class=meal-clean-row data-row="${esc(slot)}">
      <div><label>${esc(slot)}</label><select data-template data-slot="${esc(slot)}" id="mc-tpl-${key}">${options}</select></div>
      <div><label>İçerik</label><input id="mc-desc-${key}" placeholder="serbest değiştir"></div>
      <div><label>kcal</label><input id="mc-cal-${key}" type=number></div>
      <div><label>Protein</label><input id="mc-pro-${key}" type=number placeholder=g></div>
      <div><label>Karb.</label><input id="mc-carb-${key}" type=number placeholder=g></div>
      <div><label>Yağ</label><input id="mc-fat-${key}" type=number placeholder=g></div>
      <button class="btn btn-ghost" data-save-slot="${esc(slot)}">Kaydet</button>
    </div>`;
  }

  function ids(slot){ const key = slot.replace(/\s+/g,"-"); return {desc:q("mc-desc-"+key),cal:q("mc-cal-"+key),pro:q("mc-pro-"+key),carb:q("mc-carb-"+key),fat:q("mc-fat-"+key)}; }
  function fillFromTemplate(slot,id){
    const t = templates.find(x => String(x.id) === String(id));
    if (!t) return;
    const el = ids(slot);
    el.desc.value = t.description || t.title || "";
    el.cal.value = t.calories || "";
    el.pro.value = t.protein_g || "";
    el.carb.value = t.carbs_g || "";
    el.fat.value = t.fat_g || "";
  }
  async function saveSlot(slot){
    const el = ids(slot);
    const payload = {slot,title:slot,description:el.desc.value.trim(),calories:parseFloat(el.cal.value)||null,protein_g:parseFloat(el.pro.value)||null,carbs_g:parseFloat(el.carb.value)||null,fat_g:parseFloat(el.fat.value)||null,source:"meal-clean"};
    if (!payload.description && !payload.calories && !payload.protein_g && !payload.carbs_g && !payload.fat_g) return toast("Öğün için en az bir alan doldur");
    await fetch("/api/meals",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    Object.values(el).forEach(x => x.value = "");
    toast(slot + " eklendi");
    await loadMealClean();
    if (window.loadToday) await loadToday();
    if (window.refreshDeleteManager) refreshDeleteManager();
    if (window.loadReport) loadReport();
  }
  function itemHtml(m){
    return `<div class=meal-clean-item><div><b>${esc(m.slot)}: ${esc(m.description || m.title || "-")}</b><div class=card-sub>${m.calories||0} kcal · P ${m.protein_g||0} · K ${m.carbs_g||0} · Y ${m.fat_g||0}</div></div><div class=meal-clean-actions><button class=icon-btn data-delete-meal="${m.id}">Sil</button></div></div>`;
  }
  async function deleteMeal(id){
    if (!confirm("Öğün silinsin mi?")) return;
    await fetch("/api/meals/" + id, {method:"DELETE"});
    toast("Öğün silindi");
    await loadMealClean();
    if (window.loadToday) await loadToday();
    if (window.refreshDeleteManager) refreshDeleteManager();
    if (window.loadReport) loadReport();
  }
  document.addEventListener("DOMContentLoaded", mount);
  setInterval(mount, 1000);
})();
</script>
